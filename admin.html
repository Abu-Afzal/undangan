<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Catatan Undangan Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --navy:#0f1729; --navy-soft:#1a2540; --teal:#00d4aa; --teal-dark:#00b890;
            --teal-muted:rgba(0,212,170,0.10); --cream:#f0f4f8; --white:#ffffff;
            --border:#e2e8f0; --text-1:#1a2540; --text-2:#637085; --text-3:#9aa5b4;
            --danger:#f04438; --danger-soft:rgba(240,68,56,0.10);
            --warn-bg:#fff8e6; --warn-text:#92680a;
            --ok-bg:#e6faf6; --ok-text:#0d7a5f;
            --r-sm:8px; --r-md:13px; --r-lg:18px; --r-pill:999px;
            --shadow:0 1px 3px rgba(15,23,41,0.07);
        }
        body { font-family:'Inter',sans-serif; background:var(--cream); color:var(--text-1); min-height:100vh; }

        /* HEADER */
        .app-header {
            background:var(--navy); padding:20px 30px;
            display:flex; align-items:center; justify-content:space-between; gap:16px;
            position:relative; overflow:hidden;
        }
        .app-header::before {
            content:''; position:absolute; top:-60px; right:-60px;
            width:220px; height:220px;
            background:radial-gradient(circle,rgba(0,212,170,0.14) 0%,transparent 70%);
            pointer-events:none;
        }
        .header-left { display:flex; align-items:center; gap:14px; }
        .header-icon {
            font-size:24px; width:46px; height:46px;
            background:rgba(0,212,170,0.14); border-radius:12px;
            display:flex; align-items:center; justify-content:center; flex-shrink:0;
        }
        .header-title { font-size:17px; font-weight:800; color:var(--white); }
        .header-sub   { font-size:12px; color:rgba(255,255,255,0.4); margin-top:2px; }
        .header-right { display:flex; align-items:center; gap:10px; }
        .admin-badge {
            background:rgba(0,212,170,0.15); border:1px solid rgba(0,212,170,0.3);
            color:var(--teal); padding:5px 12px; border-radius:var(--r-pill);
            font-size:11.5px; font-weight:700;
        }
        .btn-logout {
            background:rgba(240,68,56,0.14); border:1px solid rgba(240,68,56,0.22);
            color:#f87171; font-family:inherit; font-size:12px; font-weight:700;
            padding:7px 14px; border-radius:var(--r-sm); cursor:pointer; transition:background 0.2s;
        }
        .btn-logout:hover { background:rgba(240,68,56,0.25); }

        /* WRAPPER */
        .wrapper { max-width:900px; margin:0 auto; padding:28px 20px 60px; }

        /* STATS ROW */
        .stats-row {
            display:grid; grid-template-columns:repeat(3,1fr);
            gap:14px; margin-bottom:24px;
        }
        .stat-card {
            background:var(--white); border:1px solid var(--border);
            border-radius:var(--r-md); padding:18px 20px;
            box-shadow:var(--shadow); display:flex;
            align-items:center; justify-content:space-between;
            border-left:3px solid var(--teal);
        }
        .stat-card.warn  { border-left-color:#f59e0b; }
        .stat-card.ok    { border-left-color:#10b981; }
        .stat-label { font-size:12px; color:var(--text-2); font-weight:500; }
        .stat-value { font-size:26px; font-weight:800; color:var(--text-1); margin-top:3px; }
        .stat-ico   { font-size:24px; opacity:0.4; }

        /* SECTION */
        .section-title {
            font-size:15px; font-weight:700; color:var(--text-1);
            margin-bottom:14px; display:flex; align-items:center; gap:8px;
        }
        .section-title .count {
            font-size:12px; font-weight:600; color:var(--teal-dark);
            background:var(--teal-muted); padding:2px 9px; border-radius:var(--r-pill);
        }

        /* TABLE */
        .table-wrap {
            background:var(--white); border:1px solid var(--border);
            border-radius:var(--r-md); box-shadow:var(--shadow);
            overflow:hidden; margin-bottom:28px;
        }
        .table-responsive { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; font-size:13.5px; }
        thead th {
            background:#f8fafc; color:var(--text-1); font-size:11.5px; font-weight:700;
            text-transform:uppercase; letter-spacing:0.5px;
            padding:11px 16px; border-bottom:1px solid var(--border);
            white-space:nowrap; vertical-align:top;
        }
        tbody td {
            padding:13px 16px; border-bottom:1px solid var(--border);
            vertical-align:middle; color:var(--text-1);
        }
        tbody tr:last-child td { border-bottom:none; }
        tbody tr:hover { background:#fafcfb; }

        .td-email { font-weight:600; }
        .td-date  { font-size:12.5px; color:var(--text-3); }

        /* STATUS PILL */
        .pill {
            display:inline-flex; align-items:center; gap:4px;
            padding:4px 11px; border-radius:var(--r-pill);
            font-size:12px; font-weight:600; white-space:nowrap;
        }
        .pill-pending { background:var(--warn-bg); color:var(--warn-text); }
        .pill-ok      { background:var(--ok-bg);   color:var(--ok-text); }

        /* ACTION BUTTONS */
        .btn-approve, .btn-reject {
            font-family:inherit; font-size:12px; font-weight:700;
            padding:6px 13px; border-radius:var(--r-sm);
            cursor:pointer; border:none; transition:all 0.15s;
        }
        .btn-approve { background:var(--teal); color:var(--navy); }
        .btn-approve:hover { background:var(--teal-dark); }
        .btn-reject  { background:var(--danger-soft); color:var(--danger); margin-left:6px; }
        .btn-reject:hover  { background:rgba(240,68,56,0.2); }

        /* EMPTY */
        .empty-row td {
            text-align:center; padding:36px; color:var(--text-3);
            font-size:13.5px; font-style:italic;
        }

        /* LOADING */
        .loading-wrap {
            text-align:center; padding:60px 20px;
            color:var(--text-3); font-size:14px;
        }
        .spinner {
            display:inline-block; width:20px; height:20px;
            border:2px solid rgba(0,212,170,0.2); border-top-color:var(--teal);
            border-radius:50%; animation:spin 0.7s linear infinite;
            vertical-align:middle; margin-right:8px;
        }
        @keyframes spin { to { transform:rotate(360deg); } }

        @media (max-width:600px) {
            .stats-row { grid-template-columns:1fr; }
            .app-header { padding:16px 18px; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
    <div class="header-left">
        <div class="header-icon">⚙️</div>
        <div>
            <div class="header-title">Panel Admin</div>
            <div class="header-sub" id="adminEmail">Memuat…</div>
        </div>
    </div>
    <div class="header-right">
        <span class="admin-badge">👑 Administrator</span>
        <button class="btn-logout" id="btnLogout">Keluar</button>
    </div>
</header>

<div class="wrapper">

    <!-- Loading awal -->
    <div class="loading-wrap" id="loadingAwal">
        <span class="spinner"></span> Memuat data…
    </div>

    <!-- Konten (tersembunyi sampai data siap) -->
    <div id="kontenAdmin" style="display:none;">

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card warn">
                <div>
                    <div class="stat-label">Menunggu Persetujuan</div>
                    <div class="stat-value" id="statPending">0</div>
                </div>
                <span class="stat-ico">⏳</span>
            </div>
            <div class="stat-card ok">
                <div>
                    <div class="stat-label">Akun Disetujui</div>
                    <div class="stat-value" id="statApproved">0</div>
                </div>
                <span class="stat-ico">✅</span>
            </div>
            <div class="stat-card">
                <div>
                    <div class="stat-label">Total Pengguna</div>
                    <div class="stat-value" id="statTotal">0</div>
                </div>
                <span class="stat-ico">👥</span>
            </div>
        </div>

        <!-- Tabel Pending -->
        <div class="section-title">
            ⏳ Menunggu Persetujuan
            <span class="count" id="countPending">0</span>
        </div>
        <div class="table-wrap">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th style="width:5%">#</th>
                            <th style="width:45%">Email</th>
                            <th style="width:25%">Tanggal Daftar</th>
                            <th style="width:25%">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelPending"></tbody>
                </table>
            </div>
        </div>

        <!-- Tabel Approved -->
        <div class="section-title">
            ✅ Akun Disetujui
            <span class="count" id="countApproved">0</span>
        </div>
        <div class="table-wrap">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th style="width:5%">#</th>
                            <th style="width:45%">Email</th>
                            <th style="width:25%">Tanggal Daftar</th>
                            <th style="width:15%">Status</th>
                            <th style="width:10%">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelApproved"></tbody>
                </table>
            </div>
        </div>

    </div><!-- /kontenAdmin -->
</div>

<script type="module">
    import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, onAuthStateChanged, signOut, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { get as dbGet } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBhDGXnuMIvfr-9AXCIw1zgDuJWfCgMUyE",
        authDomain: "data-undangan-digital-9dc5a.firebaseapp.com",
        projectId: "data-undangan-digital-9dc5a",
        storageBucket: "data-undangan-digital-9dc5a.firebasestorage.app",
        messagingSenderId: "765763173060",
        appId: "1:765763173060:web:043f3f4f5d3de0e30ae791",
        databaseURL: "https://data-undangan-digital-9dc5a-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getDatabase(app);

    // Guard: hanya admin yang boleh masuk
    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "login.html"; return; }

        const snap = await dbGet(ref(db, `users/${user.uid}/isAdmin`));
        if (snap.val() !== true) { window.location.href = "login.html"; return; }

        document.getElementById('adminEmail').textContent = user.email;
        muatSemuaUser();
    });

    document.getElementById('btnLogout').addEventListener('click', () => {
        signOut(auth).then(() => window.location.href = "login.html");
    });

    // Format tanggal
    function formatTgl(ts) {
        if (!ts) return '-';
        return new Date(ts).toLocaleDateString('id-ID', {
            day:'2-digit', month:'short', year:'numeric',
            hour:'2-digit', minute:'2-digit'
        });
    }

    // Muat semua user secara realtime
    function muatSemuaUser() {
        onValue(ref(db, 'users'), (snap) => {
            document.getElementById('loadingAwal').style.display   = 'none';
            document.getElementById('kontenAdmin').style.display   = 'block';

            const semua = snap.val() || {};
            const pending  = [];
            const approved = [];

            Object.entries(semua).forEach(([uid, data]) => {
                if (data.isAdmin) return; // skip admin
                if (data.isApproved) approved.push({ uid, ...data });
                else pending.push({ uid, ...data });
            });

            // Update stats
            document.getElementById('statPending').textContent  = pending.length;
            document.getElementById('statApproved').textContent = approved.length;
            document.getElementById('statTotal').textContent    = pending.length + approved.length;
            document.getElementById('countPending').textContent  = pending.length;
            document.getElementById('countApproved').textContent = approved.length;

            renderPending(pending);
            renderApproved(approved);
        });
    }

    function renderPending(list) {
        const tbody = document.getElementById('tabelPending');
        tbody.innerHTML = '';

        if (list.length === 0) {
            tbody.innerHTML = `<tr class="empty-row"><td colspan="4">🎉 Tidak ada akun yang menunggu persetujuan</td></tr>`;
            return;
        }

        list.forEach((u, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${i + 1}</td>
                <td class="td-email">${u.email || '-'}</td>
                <td class="td-date">${formatTgl(u.createdAt)}</td>
                <td></td>
            `;

            const btnApprove = document.createElement('button');
            btnApprove.className   = 'btn-approve';
            btnApprove.textContent = '✓ Setujui';
            btnApprove.addEventListener('click', () => {
                if (confirm(`Setujui akun "${u.email}"?`)) {
                    update(ref(db, `users/${u.uid}`), { isApproved: true });
                }
            });

            const btnReject = document.createElement('button');
            btnReject.className   = 'btn-reject';
            btnReject.textContent = '✕ Tolak';
            btnReject.addEventListener('click', () => {
                if (confirm(`Tolak & hapus akun "${u.email}"? Tindakan ini tidak bisa dibatalkan.`)) {
                    remove(ref(db, `users/${u.uid}`));
                }
            });

            tr.cells[3].appendChild(btnApprove);
            tr.cells[3].appendChild(btnReject);
            tbody.appendChild(tr);
        });
    }

    function renderApproved(list) {
        const tbody = document.getElementById('tabelApproved');
        tbody.innerHTML = '';

        if (list.length === 0) {
            tbody.innerHTML = `<tr class="empty-row"><td colspan="5">Belum ada akun yang disetujui</td></tr>`;
            return;
        }

        list.forEach((u, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${i + 1}</td>
                <td class="td-email">${u.email || '-'}</td>
                <td class="td-date">${formatTgl(u.createdAt)}</td>
                <td><span class="pill pill-ok">✓ Aktif</span></td>
                <td></td>
            `;

            const btnRevoke = document.createElement('button');
            btnRevoke.className   = 'btn-reject';
            btnRevoke.textContent = 'Cabut Akses';
            btnRevoke.addEventListener('click', () => {
                if (confirm(`Cabut akses akun "${u.email}"? Akun akan kembali ke status pending.`)) {
                    update(ref(db, `users/${u.uid}`), { isApproved: false });
                }
            });

            tr.cells[4].appendChild(btnRevoke);
            tbody.appendChild(tr);
        });
    }
</script>
</body>
</html>
