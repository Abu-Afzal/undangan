<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - SITAMU APP</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-mode">

<div class="admin-container">
    <div class="header-panel">
        <h2>Persetujuan Akun Pengguna</h2>
        <button class="btn-logout" id="btnLogoutAdmin">Keluar</button>
    </div>

    <div id="loadingStatus" class="status-loading">
        ⏳ Memuat Data Pengguna...
    </div>

    <div id="tabelKonten" style="display: none;">
        <table id="tabelPersetujuan">
            <thead>
                <tr>
                    <th>Email Pengguna</th>
                    <th>UID</th>
                    <th>Status</th>
                    <th>Tindakan</th>
                </tr>
            </thead>
            <tbody id="listPersetujuan">
                </tbody>
        </table>
    </div>
</div>

<script type="module" src="js/admin.js"></script>
</body>
</html>
