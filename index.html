<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Aplikasi Catatan Undangan Digital</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>Aplikasi Catatan Undangan Digital</h1>
        <p>Solusi Cerdas Pencatatan dan Pencarian Tamu</p>
        <div class="cloud-status" id="statusKoneksi">🔄 Menghubungkan ke Cloud...</div>
    </header>

    <div class="user-nav-bar">
        <div>Akun Aktif: <strong id="userEmailAktif">Memuat...</strong></div>
        <button type="button" class="btn btn-danger" id="btnLogout">Keluar</button>
    </div>

    <div id="areaAplikasiUtama">
        <div class="acara-section">
            <div class="acara-header">
                <div class="acara-title">Daftar Acara / Hajatan</div>
                <form class="form-tambah-acara" id="formAcara">
                    <input type="text" id="namaAcaraBaru" class="form-control" placeholder="Nama Acara Baru..." required>
                    <button type="submit" class="btn">+ Tambah</button>
                </form>
            </div>
            <div class="tabs-container" id="wadahTabs"></div>
        </div>

        <div id="kontenUtama">
            </div>
    </div>
</div>

<script type="module" src="assets/js/dashboard.js"></script>
</body>
</html>
