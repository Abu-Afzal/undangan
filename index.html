<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catatan Undangan Digital</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-wrapper">

    <!-- ===== HEADER ===== -->
    <header class="app-header">
        <div class="header-left">
            <div class="header-icon">📩</div>
            <div>
                <h1>Catatan Undangan Digital</h1>
                <p>Pencatatan & pencarian cepat tamu undangan berbasis cloud</p>
            </div>
        </div>
        <div class="header-right" id="areaHeader" style="display:none;">
            <div class="stat-chip">
                <span class="chip-label">Dana</span>
                <span class="chip-val" id="totalDana">Rp 0</span>
            </div>
            <div class="stat-chip">
                <span class="chip-label">Tamu</span>
                <span class="chip-val" id="totalTamu">0</span>
            </div>
            <div class="stat-chip warn">
                <span class="chip-label">Belum Balas</span>
                <span class="chip-val" id="totalBelum">0</span>
            </div>
            <button type="button" class="btn-logout" id="btnLogout">
                Keluar
            </button>
        </div>
        <div id="statusKoneksi" style="display:none;"></div>
    </header>

    <!-- ===== AREA UTAMA ===== -->
    <div id="areaAplikasiUtama" style="display:none;">

        <!-- Tab Acara -->
        <div class="acara-bar">
            <div class="tabs-scroll" id="wadahTabs"></div>
            <form class="form-acara" id="formAcara">
                <input type="text" id="namaAcaraBaru" class="input-acara"
                    placeholder="Nama acara baru…" required>
                <button type="submit" class="btn btn-sm">＋ Acara</button>
            </form>
        </div>

        <!-- Konten utama -->
        <div id="kontenUtama" style="display:none;">

            <!-- Toolbar: search + tambah -->
            <div class="toolbar">
                <div class="search-wrap">
                    <span class="search-ico">🔍</span>
                    <input type="text" id="keywordSaring" class="search-input"
                        placeholder="Cari nama atau asal daerah…">
                </div>
                <button type="button" class="btn" id="btnToggleForm">＋ Tambah Tamu</button>
            </div>

            <!-- Form tambah (collapsible) -->
            <div class="form-panel" id="formPanel" style="display:none;">
                <form id="formCatatan" class="form-inline">
                    <div class="fgroup">
                        <label>Nama Tamu</label>
                        <input type="text" id="namaTamu" class="finput"
                            placeholder="Contoh: Abu Afzal" required>
                    </div>
                    <div class="fgroup">
                        <label>Asal / Alamat</label>
                        <input type="text" id="asalTamu" class="finput"
                            placeholder="Contoh: Lamanda" required>
                    </div>
                    <div class="fgroup">
                        <label>Nominal (Rp)</label>
                        <input type="text" id="nominalMasker" class="finput"
                            placeholder="Contoh: 100.000" required>
                    </div>
                    <button type="submit" class="btn">Simpan</button>
                    <button type="button" class="btn btn-ghost" id="btnTutupForm">Batal</button>
                </form>
            </div>

            <!-- Info bar -->
            <div class="info-bar">
                <span class="info-acara">
                    📋 <strong class="label-acara-aktif"></strong>
                </span>
                <span class="info-count" id="tableRowCount"></span>
            </div>

            <!-- Card Grid -->
            <div class="card-grid" id="cardGrid"></div>

            <!-- Empty state -->
            <div class="empty-state" id="emptyState" style="display:none;">
                <div class="empty-emoji" id="emptyEmoji">📭</div>
                <div class="empty-msg"  id="emptyMsg">Belum ada catatan tamu</div>
                <div class="empty-sub"  id="emptySub">Klik "＋ Tambah Tamu" untuk mulai mencatat</div>
            </div>

        </div><!-- /kontenUtama -->

        <!-- Jika belum ada acara -->
        <div id="noAcara" class="no-acara" style="display:none;">
            <div class="no-acara-emoji">🗂️</div>
            <div class="no-acara-msg">Belum ada acara</div>
            <div class="no-acara-sub">Buat acara pertama menggunakan form di atas</div>
        </div>

    </div><!-- /areaAplikasiUtama -->

</div><!-- /app-wrapper -->

<script type="module" src="app.js"></script>
</body>
</html>
