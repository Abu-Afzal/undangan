<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITAMU APP - Login</title>
     <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h2>Login SITAMU</h2>
    <form id="formLogin">
        <input type="email" id="loginEmail" placeholder="Email" required><br><br>
        <input type="password" id="loginPassword" placeholder="Password" required><br><br>
        <button type="submit">Masuk</button>
    </form>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBhDGXnuMIvfr-9AXCIw1zgDuJWfCgMUyE",
        authDomain: "data-undangan-digital-9dc5a.firebaseapp.com",
        projectId: "data-undangan-digital-9dc5a",
        storageBucket: "data-undangan-digital-9dc5a.firebasestorage.app",
        messagingSenderId: "765763173060",
        appId: "1:765763173060:web:043f3f4f5d3de0e30ae791",
        databaseURL: "https://data-undangan-digital-9dc5a-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    document.getElementById('formLogin').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;

        signInWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
                const user = userCredential.user;

                // 1. DETEKSI ADMIN
                if (email.toLowerCase() === "anthonioanthox@gmail.com") {
                    window.location.href = "admin.html";
                    return; 
                }

                // 2. DETEKSI USER BIASA
                get(ref(db, `users/${user.uid}/isApproved`)).then((snapshot) => {
                    if (snapshot.val() === true) {
                        window.location.href = "index.html"; 
                    } else {
                        signOut(auth).then(() => {
                            alert("Akun Anda belum disetujui Admin.");
                        });
                    }
                });
            })
            .catch(err => alert("Gagal Masuk: " + err.message));
    });
<script type="module" src="js/sitamu.js"></script>
</body>
</html>
