<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Aplikasi Catatan Undangan</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f6f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #11998e; margin-bottom: 10px; }
        p { font-size: 14px; color: #666; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #555; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ccd1d9; border-radius: 6px; outline: none; }
        .form-control:focus { border-color: #11998e; }
        .btn { background: #11998e; color: white; border: none; width: 100%; padding: 12px; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .btn:hover { background: #0e8076; }
        .switch-auth { margin-top: 15px; font-size: 13px; color: #555; }
        .switch-auth a { color: #11998e; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-card">
    <h2 id="authTitle">Selamat Datang</h2>
    <p id="authDesc">Silakan masuk untuk mengelola catatan undangan Anda</p>
    
    <form id="authForm">
        <div class="form-group">
            <label for="email">Alamat Email</label>
            <input type="email" id="email" class="form-control" placeholder="nama@email.com" required>
        </div>
        <div class="form-group">
            <label for="password">Kata Sandi</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn" id="btnSubmit">Masuk</button>
    </form>

    <div class="switch-auth">
        <span id="switchText">Belum punya akun?</span> 
        <a href="#" id="linkSwitch">Daftar Sekarang</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // Konfigurasi Firebase Anda (Sama dengan index.html)
    const firebaseConfig = {
        apiKey: "AIzaSyBhDGXnuMIvfr-9AXCIw1zgDuJWfCgMUyE",
        authDomain: "data-undangan-digital-9dc5a.firebaseapp.com",
        projectId: "data-undangan-digital-9dc5a",
        storageBucket: "data-undangan-digital-9dc5a.firebasestorage.app",
        messagingSenderId: "765763173060",
        appId: "1:765763173060:web:043f3f4f5d3de0e30ae791",
        measurementId: "G-1HTRDFF02C",
        databaseURL: "https://data-undangan-digital-9dc5a-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let isLoginMode = true;

    const authTitle = document.getElementById('authTitle');
    const authDesc = document.getElementById('authDesc');
    const btnSubmit = document.getElementById('btnSubmit');
    const switchText = document.getElementById('switchText');
    const linkSwitch = document.getElementById('linkSwitch');
    const authForm = document.getElementById('authForm');

    linkSwitch.addEventListener('click', (e) => {
        e.preventDefault();
        isLoginMode = !isLoginMode;
        if (isLoginMode) {
            authTitle.innerText = "Selamat Datang";
            authDesc.innerText = "Silakan masuk untuk mengelola catatan undangan Anda";
            btnSubmit.innerText = "Masuk";
            switchText.innerText = "Belum punya akun?";
            linkSwitch.innerText = "Daftar Sekarang";
        } else {
            authTitle.innerText = "Buat Akun Baru";
            authDesc.innerText = "Daftar untuk mulai mencatatkan data undangan secara privat";
            btnSubmit.innerText = "Daftar";
            switchText.innerText = "Sudah punya akun?";
            linkSwitch.innerText = "Masuk di sini";
        }
    });

    authForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (isLoginMode) {
            // PROSES LOGIN
            signInWithEmailAndPassword(auth, email, password)
                .then(() => {
                    window.location.href = "index.html";
                })
                .catch((error) => {
                    alert("Gagal Masuk: " + error.message);
                });
        } else {
            // PROSES DAFTAR BARU
            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    // Daftarkan user ke Realtime Database dengan status isApproved = true secara default
                    set(ref(db, `users/${user.uid}`), {
                        email: user.email,
                        isApproved: true, // Ubah ke false jika Anda ingin menyeleksi user secara manual terlebih dahulu
                        createdAt: Date.now()
                    }).then(() => {
                        alert("Akun berhasil dibuat! Mengalihkan ke halaman utama...");
                        window.location.href = "index.html";
                    });
                })
                .catch((error) => {
                    alert("Gagal Mendaftar: " + error.message);
                });
        }
    });
</script>
</body>
</html>
